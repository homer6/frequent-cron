name: Linux

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libboost-system-dev libboost-program-options-dev libsqlite3-dev cmake

      - name: Build
        run: cmake . && make -j$(nproc)

      - name: Test
        run: make test ARGS="--output-on-failure"
