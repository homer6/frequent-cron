name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libboost-system-dev libboost-program-options-dev cmake

      - name: Build
        run: cmake . && make -j$(nproc)

      - name: Test
        run: make test ARGS="--output-on-failure"

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install boost cmake

      - name: Build
        run: cmake . && make -j$(sysctl -n hw.ncpu)

      - name: Test
        run: make test ARGS="--output-on-failure"

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Boost
        run: vcpkg install boost-asio:x64-windows boost-program-options:x64-windows

      - name: Build
        run: |
          cmake . -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake
          cmake --build . --config Release

      - name: Test
        run: ctest --test-dir . --output-on-failure -C Release
