name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libboost-system-dev libboost-program-options-dev cmake

      - name: Build
        run: cmake . && make

      - name: Test
        run: make test ARGS="--output-on-failure"

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install boost cmake

      - name: Build
        run: cmake . && make

      - name: Test
        run: make test ARGS="--output-on-failure"

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Boost
        run: vcpkg install boost-asio boost-program-options

      - name: Build
        run: |
          cmake . -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake
          cmake --build . --config Release

      - name: Test
        run: powershell -ExecutionPolicy Bypass -File tests/test_frequent_cron.ps1 -Binary .\frequent-cron.exe
